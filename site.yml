---
- name: Aktualizacja systemu
  hosts: Linux
  become: true
  become_user: root
  become_method: sudo

  tasks:
    - name: Aktualizacja listy pakietów
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade systemu
      ansible.builtin.apt:
        upgrade: dist
      register: upgrade_result

    - name: Sprawdź czy wymagany restart
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Restart jeśli wymagany
      ansible.builtin.reboot:
        msg: "Restart po aktualizacji systemu"
        reboot_timeout: 600
      when: reboot_required.stat.exists

  post_tasks:
    - name: Podsumowanie
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Pakiety zmienione: {{ upgrade_result.changed }}"
          - "Restart wykonany: {{ reboot_required.stat.exists }}"
          - "Aktualizacja zakończona."

    - name: Wyślij raport e-mail
      delegate_to: localhost
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | int }}"
        secure: starttls
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASS') }}"
        from: "{{ lookup('env', 'SMTP_FROM') }}"
        to: "{{ lookup('env', 'SMTP_TO') }}"
        subject: "Linux Update - {{ inventory_hostname }}"
        body: |
          Aktualizacja zakończona.

          Host: {{ inventory_hostname }}

          Pakiety zostały zaktualizowane:
          {{ 'TAK' if upgrade_result.changed else 'NIE' }}

          Restart wykonany:
          {{ 'TAK' if reboot_required.stat.exists else 'NIE' }}

          Status: OK
