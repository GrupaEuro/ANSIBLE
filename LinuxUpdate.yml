---
- name: Aktualizacja systemu
  hosts: Linux
  gather_facts: yes
  become: true
  become_user: root
  become_method: sudo

  tasks:
    - name: Aktualizacja listy pakietów
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update_result
      ignore_errors: yes

    - name: Aktualizacja pakietów
      ansible.builtin.apt:
        upgrade: yes
      register: upgrade_result
      ignore_errors: yes

    - name: Sprawdź czy wymagany restart
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      ignore_errors: yes

    - name: Restart jeśli wymagany
      ansible.builtin.reboot:
        msg: "Restart po aktualizacji systemu"
        reboot_timeout: 600
      when: reboot_required.stat.exists | default(false)
      register: reboot_result
      ignore_errors: yes

  post_tasks:
    - name: Wyślij raport e-mail
      delegate_to: localhost
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | int }}"
        secure: starttls
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASS') }}"
        from: "{{ lookup('env', 'SMTP_FROM') }}"
        to: "{{ lookup('env', 'SMTP_TO') }}"
        subject: "[{{ 'Failed' if (apt_update_result.failed | default(false)) or (upgrade_result.failed | default(false)) or (reboot_required.failed | default(false)) or (reboot_result.failed | default(false)) else 'Success' }}][{{ lookup('env', 'COMPANY_NAME') }}] Linux Update - {{ ansible_hostname | default(inventory_hostname) }}"
        subtype: html
        body: |
          {% set is_failed = (apt_update_result.failed | default(false)) or (upgrade_result.failed | default(false)) or (reboot_required.failed | default(false)) or (reboot_result.failed | default(false)) %}
          <html>
          <body style="margin:0;padding:0;background:#555;font-family:Arial,Helvetica,sans-serif;color:#ffffff;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#555;padding:20px;">
              <tr>
                <td align="center">

                  <table width="720" cellpadding="0" cellspacing="0" style="background:#252525;border:1px solid #b8b8b8;border-collapse:collapse;">

                    <tr>
                      <td style="background:{{ '#b00000' if is_failed else '#007a0a' }};color:#ffffff;padding:18px 24px;font-size:22px;font-weight:bold;border-bottom:1px solid #b8b8b8;">
                        Linux Update Report
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:16px 24px;border-bottom:1px solid #b8b8b8;">
                        <span style="display:inline-block;background:{{ '#5a1f1f' if is_failed else '#315f38' }};color:{{ '#ffb3b3' if is_failed else '#7cff7c' }};border:1px solid {{ '#d06060' if is_failed else '#8fd18f' }};padding:6px 14px;font-weight:bold;">
                          {{ 'FAILED' if is_failed else 'SUCCESS' }}
                        </span>
                        <span style="margin-left:12px;color:#ffffff;">
                          {{ 'Aktualizacja zakończona błędem' if is_failed else 'Aktualizacja zakończona poprawnie' }}
                        </span>
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:20px 24px 10px 24px;">
                        <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-size:14px;color:#ffffff;">
                          <tr>
                            <td style="width:220px;background:#505050;border:1px solid #b8b8b8;font-weight:bold;">Host</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">{{ ansible_hostname | default(inventory_hostname) }}</td>
                          </tr>
                          <tr>
                            <td style="background:#505050;border:1px solid #b8b8b8;font-weight:bold;">IP</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">{{ ansible_default_ipv4.address | default(inventory_hostname) }}</td>
                          </tr>
                          <tr>
                            <td style="background:#505050;border:1px solid #b8b8b8;font-weight:bold;">System</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">{{ ansible_distribution | default('Linux') }} {{ ansible_distribution_version | default('') }}</td>
                          </tr>
                          <tr>
                            <td style="background:#505050;border:1px solid #b8b8b8;font-weight:bold;">Kernel</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">{{ ansible_kernel | default('N/A') }}</td>
                          </tr>
                        </table>
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:10px 24px 20px 24px;">
                        <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-size:14px;color:#ffffff;">
                          <tr>
                            <th align="left" style="background:#505050;border:1px solid #b8b8b8;">Element</th>
                            <th align="left" style="background:#505050;border:1px solid #b8b8b8;">Wynik</th>
                          </tr>

                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Aktualizacja listy pakietów</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">
                              {{ 'FAILED' if apt_update_result.failed | default(false) else 'OK' }}
                            </td>
                          </tr>

                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Pakiety zaktualizowane</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">
                              {{ 'YES' if upgrade_result.changed | default(false) else 'NO' }}
                            </td>
                          </tr>

                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Restart wymagany</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">
                              {{ 'YES' if reboot_required.stat.exists | default(false) else 'NO' }}
                            </td>
                          </tr>

                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Restart wykonany</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">
                              {{ 'YES' if reboot_result.changed | default(false) else 'NO' }}
                            </td>
                          </tr>

                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;font-weight:bold;">Status</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;color:{{ '#ff6666' if is_failed else '#66ff66' }};font-weight:bold;">
                              {{ 'FAILED' if is_failed else 'SUCCESS' }}
                            </td>
                          </tr>

                          {% if apt_update_result.failed | default(false) and apt_update_result.msg is defined %}
                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Błąd aktualizacji listy</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;">{{ apt_update_result.msg }}</td>
                          </tr>
                          {% endif %}

                          {% if upgrade_result.failed | default(false) and upgrade_result.msg is defined %}
                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Błąd aktualizacji</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;">{{ upgrade_result.msg }}</td>
                          </tr>
                          {% endif %}

                          {% if reboot_required.failed | default(false) and reboot_required.msg is defined %}
                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Błąd sprawdzania restartu</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;">{{ reboot_required.msg }}</td>
                          </tr>
                          {% endif %}

                          {% if reboot_result.failed | default(false) and reboot_result.msg is defined %}
                          <tr>
                            <td style="background:#252525;border:1px solid #b8b8b8;">Błąd restartu</td>
                            <td style="background:#252525;border:1px solid #b8b8b8;">{{ reboot_result.msg }}</td>
                          </tr>
                          {% endif %}
                        </table>
                      </td>
                    </tr>

                    <tr>
                      <td style="background:#505050;border-top:1px solid #b8b8b8;padding:12px 24px;color:#d0d0d0;font-size:12px;">
                        Report generated automatically by Ansible Semaphore.
                      </td>
                    </tr>

                  </table>

                </td>
              </tr>
            </table>
          </body>
          </html>

    - name: Oznacz zadanie jako nieudane, jeśli aktualizacja się nie udała
      ansible.builtin.fail:
        msg: "Linux Update zakończony błędem."
      when:
        - (apt_update_result.failed | default(false)) or
          (upgrade_result.failed | default(false)) or
          (reboot_required.failed | default(false)) or
          (reboot_result.failed | default(false))
