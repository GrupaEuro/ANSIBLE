---
- name: Aktualizacja systemu
  hosts: serwery
  become: true
  become_method: sudo

  tasks:
    - name: Aktualizacja listy pakietów
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Aktualizacja wszystkich pakietów
      ansible.builtin.apt:
        upgrade: dist

    - name: Sprawdź czy wymagany jest restart
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Restart serwera jeśli wymagany
      ansible.builtin.reboot:
        msg: "Restart po aktualizacji"
        reboot_timeout: 600
      when: reboot_required.stat.exists
