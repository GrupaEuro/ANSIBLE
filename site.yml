---
- name: Aktualizacja systemu
  hosts: Linux
  gather_facts: yes
  become: true

  tasks:
    - name: Aktualizacja listy pakietów
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_update_result
      ignore_errors: yes

    - name: Aktualizacja pakietów
      ansible.builtin.apt:
        upgrade: yes
      register: upgrade_result
      ignore_errors: yes

    - name: Sprawdź czy wymagany restart
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required
      ignore_errors: yes

    - name: Restart jeśli wymagany
      ansible.builtin.reboot:
        msg: "Restart po aktualizacji systemu"
        reboot_timeout: 600
      when:
        - reboot_required.stat.exists | default(false)
      register: reboot_result
      ignore_errors: yes

  post_tasks:
    - name: Wyślij raport e-mail
      delegate_to: localhost
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | int }}"
        secure: starttls
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASS') }}"
        from: "{{ lookup('env', 'SMTP_FROM') }}"
        to: "{{ lookup('env', 'SMTP_TO') }}"
        subject: "[{{ 'Failed' if (apt_update_result.failed | default(false)) or (upgrade_result.failed | default(false)) or (reboot_result.failed | default(false)) else 'Success' }}] Linux Update - {{ ansible_hostname }}"
        subtype: html
        body: |
          {% set failed = (apt_update_result.failed | default(false)) or (upgrade_result.failed | default(false)) or (reboot_result.failed | default(false)) %}

          <html>
          <body style="margin:0;padding:25px;background:#f3f5f7;font-family:Segoe UI,Arial,sans-serif;">

          <table width="700" align="center" cellspacing="0" cellpadding="0" style="background:#fff;border:1px solid #d9dde2;">

          <tr>
            <td style="background:{{ '#c00000' if failed else '#00b050' }};color:white;padding:18px;font-size:22px;font-weight:bold;">
              Linux Update Report
            </td>
          </tr>

          <tr>
            <td style="padding:20px;">

            <table width="100%" cellspacing="0" cellpadding="8" style="border-collapse:collapse;">
              <tr>
                <td width="220" style="background:#f5f5f5;"><b>Host</b></td>
                <td>{{ ansible_hostname }}</td>
              </tr>
              <tr>
                <td style="background:#f5f5f5;"><b>IP</b></td>
                <td>{{ ansible_default_ipv4.address }}</td>
              </tr>
              <tr>
                <td style="background:#f5f5f5;"><b>System</b></td>
                <td>{{ ansible_distribution }} {{ ansible_distribution_version }}</td>
              </tr>
              <tr>
                <td style="background:#f5f5f5;"><b>Kernel</b></td>
                <td>{{ ansible_kernel }}</td>
              </tr>
            </table>

            <br>

            <table width="100%" cellspacing="0" cellpadding="8" style="border-collapse:collapse;">
              <tr style="background:#efefef;">
                <th align="left">Element</th>
                <th align="left">Wynik</th>
              </tr>

              <tr>
                <td>Aktualizacja listy pakietów</td>
                <td>{{ 'OK' if not apt_update_result.failed|default(false) else 'FAILED' }}</td>
              </tr>

              <tr>
                <td>Pakiety zostały zaktualizowane</td>
                <td>{{ 'YES' if upgrade_result.changed else 'NO' }}</td>
              </tr>

              <tr>
                <td>Restart wymagany</td>
                <td>{{ 'YES' if reboot_required.stat.exists else 'NO' }}</td>
              </tr>

              <tr>
                <td>Restart wykonany</td>
                <td>{{ 'YES' if reboot_result.changed|default(false) else 'NO' }}</td>
              </tr>

              <tr>
                <td><b>Status</b></td>
                <td>
                  <span style="color:{{ '#c00000' if failed else '#00a000' }};">
                    <b>{{ 'FAILED' if failed else 'SUCCESS' }}</b>
                  </span>
                </td>
              </tr>

              {% if apt_update_result.msg is defined %}
              <tr>
                <td>Błąd aktualizacji listy</td>
                <td>{{ apt_update_result.msg }}</td>
              </tr>
              {% endif %}

              {% if upgrade_result.msg is defined %}
              <tr>
                <td>Błąd aktualizacji</td>
                <td>{{ upgrade_result.msg }}</td>
              </tr>
              {% endif %}

              {% if reboot_result.msg is defined %}
              <tr>
                <td>Komunikat restartu</td>
                <td>{{ reboot_result.msg }}</td>
              </tr>
              {% endif %}

            </table>

            </td>
          </tr>

          <tr>
            <td style="padding:15px;background:#fafafa;border-top:1px solid #ddd;font-size:12px;color:#777;">
              Report generated automatically by Ansible Semaphore
            </td>
          </tr>

          </table>

          </body>
          </html>

    - name: Oznacz zadanie jako nieudane
      ansible.builtin.fail:
        msg: "Aktualizacja systemu zakończyła się błędem."
      when:
        - (apt_update_result.failed | default(false)) or
          (upgrade_result.failed | default(false)) or
          (reboot_result.failed | default(false))
