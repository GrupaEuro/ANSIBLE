---
- name: Aktualizacja Windows bez automatycznego restartu
  hosts: Windows
  gather_facts: yes

  tasks:
    - name: Instaluj aktualizacje Windows
      ansible.windows.win_updates:
        category_names:
          - CriticalUpdates
          - SecurityUpdates
          - UpdateRollups
        state: installed
        reboot: yes
        reboot_timeout: 3600
      register: win_update_result
      ignore_errors: yes

    - name: Pokaż wynik aktualizacji
      ansible.builtin.debug:
        var: win_update_result

    - name: Informacja, jeśli wymagany jest restart
      ansible.builtin.debug:
        msg: "Host {{ ansible_hostname }} wymaga restartu po aktualizacjach."
      when: win_update_result.reboot_required | default(false)

  post_tasks:
    - name: Wyślij raport e-mail
      delegate_to: localhost
      community.general.mail:
        host: "{{ lookup('env', 'SMTP_HOST') }}"
        port: "{{ lookup('env', 'SMTP_PORT') | int }}"
        secure: starttls
        username: "{{ lookup('env', 'SMTP_USER') }}"
        password: "{{ lookup('env', 'SMTP_PASS') }}"
        from: "{{ lookup('env', 'SMTP_FROM') }}"
        to: "{{ lookup('env', 'SMTP_TO') }}"
        subject: "[{{ 'Failed' if win_update_result.failed | default(false) else 'Success' }}] Windows Update - {{ ansible_hostname }}"
        subtype: html
        body: |
          <html>
          <body style="margin:0;padding:0;background:#f3f5f7;font-family:Arial,Helvetica,sans-serif;color:#333;">
            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f5f7;padding:24px;">
              <tr>
                <td align="center">
                  <table width="720" cellpadding="0" cellspacing="0" style="background:#ffffff;border:1px solid #d9dde2;">

                    <tr>
                      <td style="background:{{ '#c00000' if win_update_result.failed | default(false) else '#00b050' }};color:#ffffff;padding:18px 24px;font-size:22px;font-weight:bold;">
                        Windows Update Report
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:18px 24px;border-bottom:1px solid #e5e8eb;">
                        <span style="display:inline-block;background:{{ '#fdeaea' if win_update_result.failed | default(false) else '#e5f6ea' }};color:{{ '#c00000' if win_update_result.failed | default(false) else '#107c10' }};border:1px solid {{ '#e0a0a0' if win_update_result.failed | default(false) else '#9fd6a8' }};padding:6px 12px;font-weight:bold;">
                          {{ 'FAILED' if win_update_result.failed | default(false) else 'SUCCESS' }}
                        </span>
                        <span style="margin-left:12px;color:#666;">
                          {{ 'Aktualizacja zakończona błędem' if win_update_result.failed | default(false) else 'Aktualizacja zakończona poprawnie' }}
                        </span>
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:20px 24px;">
                        <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-size:14px;">
                          <tr>
                            <td style="width:220px;background:#f7f9fb;border:1px solid #dfe3e8;font-weight:bold;">Host</td>
                            <td style="border:1px solid #dfe3e8;">{{ ansible_hostname }}</td>
                          </tr>
                          <tr>
                            <td style="background:#f7f9fb;border:1px solid #dfe3e8;font-weight:bold;">IP</td>
                            <td style="border:1px solid #dfe3e8;">{{ ansible_default_ipv4.address | default(inventory_hostname) }}</td>
                          </tr>
                          <tr>
                            <td style="background:#f7f9fb;border:1px solid #dfe3e8;font-weight:bold;">System</td>
                            <td style="border:1px solid #dfe3e8;">{{ ansible_distribution | default('Windows') }} {{ ansible_distribution_version | default('') }}</td>
                          </tr>
                        </table>
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:0 24px 20px 24px;">
                        <table width="100%" cellpadding="8" cellspacing="0" style="border-collapse:collapse;font-size:14px;">
                          <tr>
                            <th align="left" style="background:#eef1f4;border:1px solid #dfe3e8;">Element</th>
                            <th align="left" style="background:#eef1f4;border:1px solid #dfe3e8;">Wynik</th>
                          </tr>

                          <tr>
                            <td style="border:1px solid #dfe3e8;">Znaleziono aktualizacji</td>
                            <td style="border:1px solid #dfe3e8;">{{ win_update_result.found_update_count | default(0) }}</td>
                          </tr>

                          <tr>
                            <td style="border:1px solid #dfe3e8;">Zainstalowano aktualizacji</td>
                            <td style="border:1px solid #dfe3e8;">{{ win_update_result.installed_update_count | default(0) }}</td>
                          </tr>

                          <tr>
                            <td style="border:1px solid #dfe3e8;">Nieudane aktualizacje</td>
                            <td style="border:1px solid #dfe3e8;">{{ win_update_result.failed_update_count | default(0) }}</td>
                          </tr>

                          <tr>
                            <td style="border:1px solid #dfe3e8;">Restart wymagany</td>
                            <td style="border:1px solid #dfe3e8;font-weight:bold;">
                              {{ 'YES' if win_update_result.reboot_required | default(false) else 'NO' }}
                            </td>
                          </tr>

                          <tr>
                            <td style="border:1px solid #dfe3e8;">Status</td>
                            <td style="border:1px solid #dfe3e8;color:{{ '#c00000' if win_update_result.failed | default(false) else '#107c10' }};font-weight:bold;">
                              {{ 'Failed' if win_update_result.failed | default(false) else 'Success' }}
                            </td>
                          </tr>

                          {% if win_update_result.msg is defined %}
                          <tr>
                            <td style="border:1px solid #dfe3e8;">Komunikat</td>
                            <td style="border:1px solid #dfe3e8;">{{ win_update_result.msg }}</td>
                          </tr>
                          {% endif %}
                        </table>
                      </td>
                    </tr>

                    <tr>
                      <td style="background:#f7f9fb;border-top:1px solid #dfe3e8;padding:12px 24px;color:#777;font-size:12px;">
                        Report generated automatically by Ansible Semaphore.
                      </td>
                    </tr>

                  </table>
                </td>
              </tr>
            </table>
          </body>
          </html>

    - name: Zakończ playbook błędem, jeśli aktualizacja się nie udała
      ansible.builtin.fail:
        msg: "Windows Update zakończony błędem: {{ win_update_result.msg | default('nieznany błąd') }}"
      when: win_update_result.failed | default(false)
